<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" width="100%" font-family="-apple-system, BlinkMacSystemFont, 'DM Sans', system-ui, 'Noto Sans SC', sans-serif">
  <defs>
    <style>
      .bg { fill: #fdfaf3; }
      .card { fill: #ffffff; stroke: #ebe4d2; stroke-width: 1.5; }
      .card-accent { fill: #ffffff; stroke: #d97757; stroke-width: 2; }
      .title { font-size: 19px; font-weight: 700; fill: #2b2620; }
      .sub { font-size: 12.5px; fill: #5a544a; }
      .mono { font-family: 'DM Mono', ui-monospace, SFMono-Regular, monospace; font-size: 11.5px; fill: #948a78; letter-spacing: 0.3px; }
      .mono-orange { fill: #d97757; }
      .arrow { fill: none; stroke: #2b2620; stroke-width: 1.8; }
      .arrow-soft { fill: none; stroke: #5a544a; stroke-width: 1.5; stroke-dasharray: 4 3; }
      .label { font-size: 11px; fill: #5a544a; font-family: 'DM Mono', monospace; letter-spacing: 0.2px; }
      .tag { font-family: 'DM Mono', monospace; font-size: 9.5px; fill: #fff; letter-spacing: 1px; }
      .hero-title { font-size: 26px; font-weight: 700; fill: #2b2620; }
      .hero-accent { fill: #d97757; }
      .hero-sub { font-size: 12px; fill: #948a78; font-family: 'DM Mono', monospace; letter-spacing: 1px; }
      .divider { stroke: #ebe4d2; stroke-width: 1; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2b2620"/>
    </marker>
    <marker id="arrow-soft" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5a544a"/>
    </marker>
    <linearGradient id="wave" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d97757"/>
      <stop offset="100%" stop-color="#b85a3e"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect class="bg" width="1200" height="760"/>

  <!-- title -->
  <g transform="translate(600, 50)">
    <text class="hero-title" text-anchor="middle">
      实时<tspan class="hero-accent">转译</tspan>
      <tspan class="hero-sub" dx="14">SYSTEM ARCHITECTURE</tspan>
    </text>
  </g>

  <!-- =========== Top row =========== -->

  <!-- Browser card -->
  <g transform="translate(60, 115)">
    <rect class="card" width="300" height="200" rx="16"/>
    <!-- phone mockup -->
    <g transform="translate(22, 22)">
      <rect width="64" height="100" rx="10" fill="#2b2620"/>
      <rect x="3" y="3" width="58" height="94" rx="7" fill="#fdfaf3"/>
      <text x="32" y="22" text-anchor="middle" font-size="10" font-weight="700" fill="#2b2620">实时</text>
      <text x="32" y="34" text-anchor="middle" font-size="10" font-weight="700" fill="#d97757">转译</text>
      <!-- mini waveform -->
      <g transform="translate(10, 60)">
        <rect width="2" height="6"  y="6" fill="url(#wave)"/>
        <rect width="2" height="14" y="-2" x="4" fill="url(#wave)"/>
        <rect width="2" height="10" y="2" x="8" fill="url(#wave)"/>
        <rect width="2" height="18" y="-6" x="12" fill="url(#wave)"/>
        <rect width="2" height="8"  y="4" x="16" fill="url(#wave)"/>
        <rect width="2" height="12" y="0" x="20" fill="url(#wave)"/>
        <rect width="2" height="16" y="-4" x="24" fill="url(#wave)"/>
        <rect width="2" height="6"  y="6" x="28" fill="url(#wave)"/>
        <rect width="2" height="10" y="2" x="32" fill="url(#wave)"/>
        <rect width="2" height="14" y="-2" x="36" fill="url(#wave)"/>
        <rect width="2" height="8"  y="4" x="40" fill="url(#wave)"/>
      </g>
      <!-- mic button -->
      <circle cx="32" cy="88" r="6" fill="#d97757"/>
    </g>

    <text class="title" x="180" y="42">Browser</text>
    <text class="sub" x="180" y="64">Vanilla JS · 单文件 SPA</text>

    <line class="divider" x1="180" y1="80" x2="278" y2="80"/>

    <text class="mono" x="180" y="105">• Web Audio FFT 音波</text>
    <text class="mono" x="180" y="125">• Silero VAD ONNX</text>
    <text class="mono" x="180" y="145">• Live Captions UI</text>
    <text class="mono" x="180" y="165">• PWA / 移动端优先</text>
  </g>

  <!-- arrow Browser -> FastAPI -->
  <g>
    <line class="arrow" x1="368" y1="215" x2="510" y2="215" marker-end="url(#arrow)"/>
    <text class="label" x="439" y="205" text-anchor="middle">WebSocket</text>
    <text class="label" x="439" y="232" text-anchor="middle">PCM16 · 24 kHz</text>
  </g>

  <!-- FastAPI card -->
  <g transform="translate(520, 115)">
    <rect class="card-accent" width="320" height="200" rx="16"/>
    <text class="title" x="160" y="42" text-anchor="middle">FastAPI Server</text>
    <text class="sub" x="160" y="64" text-anchor="middle">async router · WebSocket handler</text>

    <line class="divider" x1="22" y1="80" x2="298" y2="80"/>

    <text class="mono" x="160" y="105" text-anchor="middle">RoomManager (内存 + db)</text>
    <text class="mono" x="160" y="125" text-anchor="middle">RecordingSession 延迟创建</text>
    <text class="mono" x="160" y="145" text-anchor="middle">Trial Limit · Hallucination Filter</text>
    <text class="mono mono-orange" x="160" y="170" text-anchor="middle">pick_backend(config)</text>
  </g>

  <!-- arrow FastAPI -> SQLite -->
  <g>
    <line class="arrow" x1="848" y1="215" x2="980" y2="215" marker-end="url(#arrow)"/>
    <text class="label" x="914" y="205" text-anchor="middle">persist</text>
  </g>

  <!-- SQLite cylinder -->
  <g transform="translate(990, 115)">
    <!-- cylinder bottom -->
    <ellipse cx="90" cy="190" rx="90" ry="12" fill="#fff" stroke="#ebe4d2" stroke-width="1.5"/>
    <!-- cylinder body -->
    <path d="M 0 24 L 0 190" fill="none" stroke="#ebe4d2" stroke-width="1.5"/>
    <path d="M 180 24 L 180 190" fill="none" stroke="#ebe4d2" stroke-width="1.5"/>
    <rect x="0" y="24" width="180" height="166" fill="#ffffff"/>
    <!-- top ellipse -->
    <ellipse cx="90" cy="24" rx="90" ry="12" fill="#ffffff" stroke="#ebe4d2" stroke-width="1.5"/>

    <text class="title" x="90" y="60" text-anchor="middle">SQLite</text>
    <text class="sub" x="90" y="80" text-anchor="middle">WAL · 单文件</text>

    <text class="mono" x="90" y="115" text-anchor="middle">users · sessions</text>
    <text class="mono" x="90" y="135" text-anchor="middle">recordings</text>
    <text class="mono" x="90" y="155" text-anchor="middle">rooms · room_messages</text>
  </g>

  <!-- =========== middle splitter =========== -->

  <!-- vertical splitter line below FastAPI -->
  <g>
    <line class="arrow" x1="680" y1="315" x2="680" y2="395" marker-end="url(#arrow)"/>
    <text class="label" x="690" y="365">engine</text>
  </g>

  <!-- horizontal splitter to 3 engines -->
  <g>
    <path class="arrow" d="M 240 425 L 240 460" marker-end="url(#arrow)"/>
    <path class="arrow" d="M 605 425 L 605 460" marker-end="url(#arrow)"/>
    <path class="arrow" d="M 970 425 L 970 460" marker-end="url(#arrow)"/>
    <!-- horizontal connector -->
    <path class="arrow" d="M 240 425 L 970 425"/>
    <line class="arrow" x1="680" y1="395" x2="680" y2="425"/>
  </g>

  <!-- =========== Bottom row 3 engines =========== -->

  <!-- Qwen3-ASR -->
  <g transform="translate(60, 470)">
    <rect class="card" width="360" height="220" rx="16"/>
    <rect x="22" y="22" width="58" height="22" rx="11" fill="#587a4f"/>
    <text class="tag" x="51" y="37" text-anchor="middle">ZH · CN</text>
    <text class="title" x="22" y="80">🎤 Qwen3-ASR</text>
    <text class="sub" x="22" y="102">DashScope · 26 种语言识别</text>
    <line class="divider" x1="22" y1="120" x2="338" y2="120"/>
    <text class="mono" x="22" y="145">WebSocket · PCM 16 kHz</text>
    <text class="mono" x="22" y="167">VAD partial + completed final</text>
    <text class="mono mono-orange" x="22" y="190">→ DeepSeek-V4 翻译 (HTTP)</text>
    <text class="mono" x="22" y="208">→ Qwen3-TTS (可选)</text>
  </g>

  <!-- middle pick_backend label -->
  <g transform="translate(425, 470)">
    <rect width="360" height="220" rx="16" fill="#f5f0e3" stroke="#ebe4d2" stroke-width="1.5" stroke-dasharray="3 3"/>
    <text class="title" x="180" y="50" text-anchor="middle">pick_backend()</text>
    <text class="sub" x="180" y="74" text-anchor="middle">智能引擎路由</text>
    <line class="divider" x1="22" y1="92" x2="338" y2="92"/>
    <text class="mono" x="180" y="120" text-anchor="middle">engine == "openai" &amp;</text>
    <text class="mono" x="180" y="138" text-anchor="middle">translate &amp; tgt ∈ 13种</text>
    <text class="mono mono-orange" x="180" y="160" text-anchor="middle">→ OpenAI 直译</text>
    <text class="mono" x="180" y="188" text-anchor="middle">否则 → DashScope 路径</text>
  </g>

  <!-- OpenAI Realtime -->
  <g transform="translate(790, 470)">
    <rect class="card" width="360" height="220" rx="16"/>
    <rect x="22" y="22" width="58" height="22" rx="11" fill="#4d7a8a"/>
    <text class="tag" x="51" y="37" text-anchor="middle">INTL</text>
    <text class="title" x="22" y="80">⚡ OpenAI Realtime</text>
    <text class="sub" x="22" y="102">gpt-realtime-translate</text>
    <line class="divider" x1="22" y1="120" x2="338" y2="120"/>
    <text class="mono" x="22" y="145">WebSocket · PCM 24 kHz</text>
    <text class="mono" x="22" y="167">语音 → 译文 端到端</text>
    <text class="mono mono-orange" x="22" y="190">delta 字符级流式</text>
    <text class="mono" x="22" y="208">13 种目标语言</text>
  </g>

  <!-- footer -->
  <text class="hero-sub" x="600" y="735" text-anchor="middle" fill="#948a78">
    LIVE · translate.viberules.app  ·  github.com/Timelk/realtime-translate
  </text>
</svg>
